<!DOCTYPE html>
<html>

<head>
    <title>LaTeX Delimiter Test</title>
    <style>
        body {
            padding: 40px;
            font-family: sans-serif;
        }

        .math-container {
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .inline-math {
            display: inline-block;
            background: #f0f0f0;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .block-math {
            display: block;
            background: #f0f0f0;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
            margin: 10px 0;
        }

        .has-copy-btn {
            position: relative;
        }

        .formula-copy-btn {
            position: absolute;
            top: 0;
            right: 0;
            padding: 4px 8px;
            font-size: 11px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
    <!-- Mocks for extension APIs -->
    <script>
        window.mockStorage = { copyFormat: 'latex', latexDelimiter: 'dollar' };
        window.chrome = {
            storage: { sync: { get: (keys, cb) => cb(window.mockStorage) } }
        };
        // Mock MathBridge extraction function attached to elements
        window.extractMock = (el) => el.getAttribute('data-tex');
    </script>
</head>

<body>
    <h2>LaTeX Delimiter Test</h2>
    <p>Set mock format to LaTeX, delimiter: <strong>Dollar ($$)</strong></p>

    <div class="math-container">
        <h3>Inline Equation</h3>
        <p>This is an inline equation <span class="inline-math mock-math" data-tex="E=mc^2">E=mc^2</span> within some
            text.</p>
    </div>

    <div class="math-container">
        <h3>Block Equation</h3>
        <div class="block-math mock-math math-block" data-tex="\int_0^\infty e^{-x^2} dx = \frac{\sqrt{\pi}}{2}">
            \int_0^\infty e^{-x^2} dx = \frac{\sqrt{\pi}}{2}
        </div>
    </div>

    <!-- Include actual content script logic for testing -->
    <script>
        // Mock writePlain to see results in console instead of clipboard
        function writePlain(text, btn) {
            console.log("Copied Result:\n" + text);
            alert("Copied:\n\n" + text);
        }

        // Include the new copyRaw logic from content.js
        function copyRaw(source, isBlock, delimiter, btn) {
            let output = source;
            if (delimiter === 'dollar') {
                output = isBlock ? `$$\n${source}\n$$` : `$${source}$`;
            } else if (delimiter === 'bracket') {
                output = isBlock ? `\\[\n${source}\n\\]` : `\\(${source}\\)`;
            }
            writePlain(output, btn);
        }

        // Setup mock buttons
        document.querySelectorAll('.mock-math').forEach(mathEl => {
            mathEl.classList.add('has-copy-btn');
            const btn = document.createElement('button');
            btn.className = 'formula-copy-btn';
            btn.textContent = 'Copy';
            mathEl.appendChild(btn);

            mathEl.addEventListener('click', (e) => {
                e.preventDefault();
                const source = window.extractMock(mathEl);
                const isBlock = mathEl.classList.contains('math-block');

                chrome.storage.sync.get({ copyFormat: 'mathml', latexDelimiter: 'none' }, (result) => {
                    const format = result.copyFormat;
                    const delimiter = result.latexDelimiter;
                    if (format === 'latex') copyRaw(source, isBlock, delimiter, btn);
                });
            });
        });
    </script>
</body>

</html>
